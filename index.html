<!DOCTYPE html>
<html>
<head>
  <title>Swastik Portfolio</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #F8FAFC;
      color: #1E293B;
    }

    /* Hero Section */
    .hero {
      background: linear-gradient(135deg, #4F46E5, #22C55E);
      color: white;
      text-align: center;
      padding: 60px 20px;
    }

    /* Sections */
    .section {
      padding: 40px 20px;
      text-align: center;
    }

    /* Cards */
    .card-container {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      width: 200px;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    /* Button */
    .btn {
      background: #4F46E5;
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      margin-top: 10px;
    }

    .btn:hover {
      background: #3730A3;
    }

  </style>
</head>

<body>

  <!-- Hero -->
  <div class="hero">
    <h1>Swastik</h1>
    <p>Aspiring Developer building real-world projects 🚀</p>
    <button class="btn">Contact Me</button>
  </div>

  <!-- Projects -->
  <div class="section">
    <h2>My Projects</h2>

    <div class="card-container">
      <div class="card">
        <h3>Project 1</h3>
        <p>Coming Soon</p>
      </div>

      <div class="card">
        <h3>Project 2</h3>
        <p>Coming Soon</p>
      </div>
    </div>
  </div>

  <!-- Contact -->
  <div class="section" style="background:#E2E8F0;">
    <h2>Contact</h2>
    <p>Email: your@email.com</p>
  </div>

</body>
</html>
