<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Swastik Portfolio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: #0F172A;
      color: white;
    }

    /* HERO */
    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #4F46E5, #22C55E);
      text-align: center;
      padding: 20px;
    }

    .hero h1 {
      font-size: 3rem;
    }

    .hero p {
      margin-top: 10px;
      font-size: 1.2rem;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 25px;
      background: white;
      color: #4F46E5;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      background: #ddd;
    }

    /* SECTION */
    .section {
      padding: 60px 20px;
      text-align: center;
    }

    /* PROJECT CARDS */
    .projects {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
      margin-top: 30px;
    }

    .card {
      background: #1E293B;
      padding: 20px;
      border-radius: 15px;
      width: 220px;
      transition: 0.3s;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }

    .card:hover {
      transform: translateY(-10px) scale(1.03);
    }

    /* CONTACT */
    .contact {
      background: #020617;
    }

    a {
      color: #22C55E;
      text-decoration: none;
    }

  </style>
</head>

<body>

  <!-- HERO -->
  <div class="hero">
    <h1>Swastik 🚀</h1>
    <p>Frontend Developer | Building cool websites</p>
    <button class="btn">Contact Me</button>
  </div>

  <!-- PROJECTS -->
  <div class="section">
    <h2>My Projects</h2>

    <div class="projects">
      <div class="card">
        <h3>Calculator App</h3>
        <p>Basic calculator using HTML & CSS</p>
      </div>

      <div class="card">
        <h3>To-Do App</h3>
        <p>Task manager with JavaScript</p>
      </div>

      <div class="card">
        <h3>Portfolio Website</h3>
        <p>This modern portfolio design</p>
      </div>
    </div>
  </div>

  <!-- CONTACT -->
  <div class="section contact">
    <h2>Contact Me</h2>
    <p>Email: swastik27.2011@email.com</p>
    <p>GitHub: <a href="#">Add your link</a></p>
  </div>

</body>
</html>
