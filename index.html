<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Swastik | Developer</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  scroll-behavior:smooth;
}

body{
  font-family:'Poppins',sans-serif;
  background: linear-gradient(-45deg,#0F172A,#020617,#4F46E5,#22C55E);
  background-size:400% 400%;
  animation: bg 12s ease infinite;
  color:white;
}

@keyframes bg{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

/* NAVBAR */
.navbar{
  position:fixed;
  width:100%;
  padding:15px;
  display:flex;
  justify-content:center;
  gap:30px;
  background:rgba(0,0,0,0.3);
  backdrop-filter:blur(10px);
}

.navbar a{
  color:white;
  text-decoration:none;
  font-weight:500;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h1{
  font-size:3rem;
}

#typing{
  margin-top:10px;
  font-size:1.3rem;
  color:#22C55E;
}

/* BUTTON */
.btn{
  margin-top:20px;
  padding:12px 25px;
  border:none;
  border-radius:30px;
  background:white;
  color:#4F46E5;
  cursor:pointer;
  transition:.3s;
}

.btn:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px #fff;
}

/* SECTIONS */
.section{
  padding:100px 20px;
  text-align:center;
  opacity:0;
  transform:translateY(50px);
  transition:0.8s;
}

.section.show{
  opacity:1;
  transform:translateY(0);
}

/* GLASS CARDS */
.container{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:20px;
  margin-top:30px;
}

.card{
  padding:20px;
  width:220px;
  border-radius:20px;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(15px);
  transition:.3s;
}

.card:hover{
  transform:translateY(-10px);
  box-shadow:0 0 20px rgba(255,255,255,0.3);
}

/* FOOTER */
.footer{
  text-align:center;
  padding:20px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
<a href="#home">Home</a>
<a href="#services">Services</a>
<a href="#projects">Projects</a>
<a href="#contact">Contact</a>
</div>

<!-- HERO -->
<div class="hero" id="home">
<h1>Swastik 🚀</h1>
<div id="typing"></div>

<a href="#contact"><button class="btn">Hire Me</button></a>
</div>

<!-- SERVICES -->
<div class="section" id="services">
<h2>My Services</h2>
<div class="container">
<div class="card">Website Design</div>
<div class="card">Frontend Development</div>
<div class="card">Portfolio Websites</div>
</div>
</div>

<!-- PROJECTS -->
<div class="section" id="projects">
<h2>Projects</h2>
<div class="container">
<div class="card">Calculator App</div>
<div class="card">To-Do App</div>
<div class="card">Portfolio</div>
</div>
</div>

<!-- CONTACT -->
<div class="section" id="contact">
<h2>Contact</h2>
<p>swastik27.2011@gmail.com</p>
</div>

<!-- FOOTER -->
<div class="footer">
<p>© 2026 Swastik</p>
</div>

<script>
/* SCROLL ANIMATION */
const sections=document.querySelectorAll(".section");
window.addEventListener("scroll",()=>{
sections.forEach(sec=>{
if(sec.getBoundingClientRect().top<window.innerHeight-100){
sec.classList.add("show");
}
});
});

/* TYPING EFFECT */
const texts=["Frontend Developer 💻","Web Designer 🎨","Freelancer 💼"];
let i=0,j=0,current="",isDeleting=false;

function type(){
current=texts[i];

if(isDeleting){
document.getElementById("typing").innerHTML=current.substring(0,j--);
}else{
document.getElementById("typing").innerHTML=current.substring(0,j++);
}

if(!isDeleting && j===current.length){
isDeleting=true;
setTimeout(type,1000);
}
else if(isDeleting && j===0){
isDeleting=false;
i=(i+1)%texts.length;
setTimeout(type,300);
}
else{
setTimeout(type,isDeleting?50:100);
}
}

type();
</script>

</body>
</html>
